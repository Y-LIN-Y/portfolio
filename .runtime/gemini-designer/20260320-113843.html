<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Hero | Interactive Type</title>
    
    <style>
        /* 
         * FEATURE: FONTS & RESET 
         * Importing Mango Grotesque for that condensed, impact-heavy look.
         */
        @import url('https://db.onlinewebfonts.com/c/0d7c90bf2d5c8dcc4fa27a5ba6cbad81?family=Mango+Grotesque');

        :root {
            --c-bg: #FFFFFF;
            --c-text-diff: #FFFFFF; /* White text for difference blend mode = Black on White */
            --c-accent: #B8A44C;
            --c-cursor: #000000;
            --ease-out-expo: cubic-bezier(0.19, 1, 0.22, 1);
            --ease-smooth: cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--c-bg);
            font-family: 'Mango Grotesque', 'Impact', 'Arial Narrow', sans-serif;
            overflow: hidden; /* Prevent native scroll for this demo */
            height: 100vh;
            width: 100vw;
            cursor: none; /* Hide default cursor */
            -webkit-font-smoothing: antialiased;
        }

        /* 
         * FEATURE: CUSTOM CURSOR 
         * A DOM element that follows mouse with lerp. 
         * Starts small (20px), expands on hover state.
         */
        #cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 20px;
            height: 20px;
            background-color: var(--c-cursor);
            border-radius: 50%;
            pointer-events: none;
            z-index: 10;
            transform: translate3d(-50%, -50%, 0);
            transition: width 0.4s var(--ease-out-expo), height 0.4s var(--ease-out-expo);
            will-change: transform, width, height;
        }

        #cursor.expanded {
            width: 350px;
            height: 350px;
        }

        /* 
         * FEATURE: UI ELEMENTS
         * Peripheral elements (AD label, Editorial marker, Scroll)
         */
        .ui-element {
            position: absolute;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.05em;
            color: #000;
            z-index: 50;
        }

        .editorial-marker {
            top: 40px;
            left: 40px;
            opacity: 0;
            animation: fadeIn 1s 1s forwards;
        }

        .ad-label {
            top: 40px;
            right: 40px;
            border: 1px solid #000;
            padding: 4px 8px;
            opacity: 0;
            animation: fadeIn 1s 1.2s forwards;
        }

        .vertical-text {
            top: 50%;
            right: 40px;
            transform: translateY(-50%) rotate(180deg);
            writing-mode: vertical-lr; /* Vertical text */
            letter-spacing: 0.2em;
            font-size: 10px;
            opacity: 0;
            animation: fadeIn 1s 1.4s forwards;
        }

        .scroll-indicator {
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            animation: fadeInUp 1s 1.6s forwards;
        }
        
        .scroll-circle {
            width: 40px;
            height: 40px;
            border: 1px solid #000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
        }

        .arrow-down {
            width: 0; 
            height: 0; 
            border-left: 4px solid transparent;
            border-right: 4px solid transparent;
            border-top: 6px solid #000;
        }

        /* 
         * FEATURE: MAIN LAYOUT
         * Centered container for the massive typography
         */
        .hero-container {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Positioning context for relative children */
            position: relative;
        }

        .type-interaction-zone {
            position: relative;
            z-index: 20; /* Above cursor */
            display: flex;
            flex-direction: column;
            /* mix-blend-mode: difference is KEY.
               Text is white. Bg is white. Diff = Black.
               Cursor is black. Text on Cursor = White.
            */
            mix-blend-mode: difference;
            color: var(--c-text-diff);
            /* Padding ensures the hover zone is slightly larger than text */
            padding: 50px 0; 
        }

        /* 
         * FEATURE: TYPOGRAPHY
         * Staircase layout, massive sizing, fluid typography
         */
        .display-line {
            font-size: clamp(60px, 14vw, 220px);
            line-height: 0.82;
            font-weight: 900;
            text-transform: uppercase;
            overflow: hidden; /* For the slide transition */
            position: relative;
            height: 0.85em; /* Lock height to avoid layout shift */
            display: flex;
            align-items: flex-start;
            opacity: 0; /* Load animation start state */
            transform: translateY(20px);
            white-space: nowrap;
        }

        /* Staircase Indentation */
        .display-line:nth-child(1) { margin-left: 0; }
        .display-line:nth-child(2) { margin-left: 15vw; }
        .display-line:nth-child(3) { margin-left: 30vw; }

        /* The container that slides up/down */
        .text-slider {
            display: flex;
            flex-direction: column;
            transition: transform 0.5s var(--ease-out-expo);
        }

        /* Interaction State: Slide text up */
        .type-interaction-zone:hover .display-line:not(.static) .text-slider {
            transform: translateY(-50%); /* Slide up to show second phrase */
        }

        .word {
            display: block;
            height: 100%; /* Matches line height */
            /* Ensure glyphs don't get cut off vertically */
            padding-bottom: 0.1em; 
        }

        /* 
         * FEATURE: ACCENT BAR
         * The gold strikethrough/highlight that appears on hover
         */
        .accent-bar {
            position: absolute;
            top: 52%;
            left: -2%;
            width: 0%;
            height: 0.15em;
            background-color: var(--c-accent); /* This color will invert strangely with mix-blend-mode difference, so we handle it carefully */
            z-index: -1; /* Behind text */
            transition: width 0.5s var(--ease-out-expo) 0.1s;
            /* To make color persist through difference mode cleanly, we might need isolation or a different approach.
               However, with difference: White Text - Gold Bar = Inverted Color. 
               To keep it Gold, we can place a duplicate element outside the difference container or accept the stylistic inversion.
               Let's keep it inside for structure, but tweak the color logic below.
            */
            mix-blend-mode: normal; /* Reset mix blend for the bar so it overlays the black text (which is actually inverted white) */
        }
        
        /* 
           Correction for Accent Bar:
           Since the parent has mix-blend-mode: difference against a White BG, 
           anything inside is inverted visually. 
           If we want Gold visually, we need the inverse of Gold in the code, OR
           we place the accent bar OUTSIDE the mix-blend-mode container.
           
           Let's handle the accent bar via a separate absolutely positioned layer 
           behind the text wrapper to ensure color accuracy.
        */
       
        /* Refactor: Local logic for text slider spans */
        .line-1 span, .line-2 span {
            display: block;
            height: 1em; /* Matches the slider height calculation */
        }

        /* 
         * ANIMATIONS 
         */
        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* Load Stagger Animation applied by JS */
        .display-line.reveal {
            transition: opacity 0.8s ease, transform 0.8s var(--ease-out-expo);
            opacity: 1;
            transform: translateY(0);
        }

        /* 
         * FEATURE: ACCENT BAR (EXTERNAL)
         * Placing it outside the difference blend container to maintain true color
         */
        .accent-overlay {
            position: absolute;
            height: 0.12em; 
            background-color: var(--c-accent);
            pointer-events: none;
            z-index: 15; /* Below text (20), above cursor (10) */
            top: 0; left: 0;
            width: 0;
            transition: width 0.5s var(--ease-out-expo);
            /* We need to sync its position with line-2 via JS or clever CSS */
            display: none; /* Controlled by JS for perfect positioning */
        }

    </style>
</head>
<body>

    <!-- FEATURE: CUSTOM CURSOR -->
    <div id="cursor"></div>

    <!-- FEATURE: PERIPHERAL UI -->
    <div class="ui-element editorial-marker">VOL. 01 — 2023 REEL</div>
    <div class="ui-element ad-label">AD</div>
    <div class="ui-element vertical-text">GOOD DESIGN IS HONEST</div>
    
    <div class="ui-element scroll-indicator">
        <div class="scroll-circle">
            <div class="arrow-down"></div>
        </div>
        <span>SCROLL</span>
    </div>
    
    <!-- We need a separate accent bar to avoid mix-blend-mode coloring issues -->
    <div id="accent-bar" class="accent-overlay"></div>

    <main class="hero-container">
        <!-- FEATURE: INTERACTIVE TEXT ZONE -->
        <div class="type-interaction-zone" id="hero-text">
            
            <!-- Line 1: Swaps Multi -> Talented -->
            <div class="display-line line-1">
                <div class="text-slider">
                    <span class="word">MULTI—</span>
                    <span class="word">TALENTED</span>
                </div>
            </div>

            <!-- Line 2: Swaps Disciplined -> Innovative -->
            <div class="display-line line-2" id="target-line-2">
                <div class="text-slider">
                    <span class="word">DISCIPLINED</span>
                    <span class="word">INNOVATIVE</span>
                </div>
            </div>

            <!-- Line 3: Static -->
            <div class="display-line line-3 static">
                <div class="text-slider">
                    <span class="word">DESIGNER</span>
                </div>
            </div>

        </div>
    </main>

    <script>
        // --- 1. CURSOR LOGIC ---
        const cursor = document.getElementById('cursor');
        const heroText = document.getElementById('hero-text');
        
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        let cursorX = window.innerWidth / 2;
        let cursorY = window.innerHeight / 2;
        
        // Lerp factor (lower = smoother/slower)
        const lerpFactor = 0.15;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        // Animation loop for smooth cursor following
        function animateCursor() {
            // Lerp formula: current + (target - current) * factor
            cursorX += (mouseX - cursorX) * lerpFactor;
            cursorY += (mouseY - cursorY) * lerpFactor;

            cursor.style.transform = `translate3d(${cursorX}px, ${cursorY}px, 0) translate(-50%, -50%)`;
            
            requestAnimationFrame(animateCursor);
        }
        animateCursor();

        // --- 2. INTERACTION STATES ---
        const accentBar = document.getElementById('accent-bar');
        const targetLine2 = document.getElementById('target-line-2');

        // Function to update accent bar position based on Line 2
        function updateAccentBar() {
            const rect = targetLine2.getBoundingClientRect();
            // Position bar in the middle of Line 2
            accentBar.style.top = (rect.top + rect.height * 0.55) + 'px'; // 0.55 visual adjustment
            accentBar.style.left = rect.left + 'px';
            accentBar.style.height = (rect.height * 0.15) + 'px'; // Proportional height
            
            // Interaction: if hovered, width = rect.width, else 0
            if(heroText.matches(':hover')) {
                accentBar.style.width = (rect.width * 1.05) + 'px'; // Slight overhang
            } else {
                accentBar.style.width = '0px';
            }
        }

        // --- 3. EVENT LISTENERS ---
        
        heroText.addEventListener('mouseenter', () => {
            cursor.classList.add('expanded');
            accentBar.style.display = 'block';
            // Force a recalc of position immediately
            updateAccentBar();
        });

        heroText.addEventListener('mouseleave', () => {
            cursor.classList.remove('expanded');
            setTimeout(() => {
                if(!heroText.matches(':hover')) accentBar.style.width = '0px';
            }, 50); // Small buffer
        });

        // Handle window resize to fix accent bar positioning
        window.addEventListener('resize', updateAccentBar);
        // Also update on mousemove inside zone just to be safe if layout shifts? 
        // Not strictly necessary for static layout but good for robustness.
        heroText.addEventListener('mousemove', updateAccentBar);


        // --- 4. PAGE LOAD ANIMATION ---
        
        window.addEventListener('load', () => {
            const lines = document.querySelectorAll('.display-line');
            
            // Staggered reveal
            lines.forEach((line, index) => {
                setTimeout(() => {
                    line.classList.add('reveal');
                }, 200 + (index * 150));
            });
        });

    </script>
</body>
</html>
