<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shanghai Planetarium - Portfolio Row</title>
    <style>
        /* FEATURE: Import Google Fonts to match design specs */
        @import url('https://fonts.googleapis.com/css2?family=Antonio:wght@700&family=Outfit:wght@300;400&family=Space+Mono:wght@400;700&display=swap');

        :root {
            /* Design System Colors */
            --bg: #EDEBE6;
            --ink: #0D0D0D;
            --ink-muted: #7A7770;
            --forest-green: #275E48;
            --lavender: #C8B4FF;
            --yellow: #FFD600;

            /* Typeface Mappings */
            --font-display: 'Antonio', sans-serif; /* Proxy for Mango Grotesque */
            --font-body: 'Outfit', sans-serif;
            --font-mono: 'Space Mono', monospace;

            /* Animation */
            --ease-editorial: cubic-bezier(0.19, 1, 0.22, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--ink);
            font-family: var(--font-body);
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* 
           FEATURE: Row Container 
           Grid layout that separates content cleanly.
        */
        .portfolio-row {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            padding: 4rem 0 6rem 0;
            cursor: default;
        }

        .content-grid {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 4rem;
            margin-bottom: 3rem;
            align-items: flex-end;
        }

        /* 
           FEATURE: Stacked Title Typography 
           Specific indentations and stroke effects.
        */
        .project-title {
            font-family: var(--font-display);
            font-size: clamp(3rem, 5.5vw, 6.5rem);
            line-height: 0.88;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            display: flex;
            flex-direction: column;
            /* Fix for Condensed font vertical metrics */
            padding-top: 0.2em; 
        }

        .title-line {
            display: inline-block;
            transition: margin-left 0.6s var(--ease-editorial),
                        color 0.6s var(--ease-editorial),
                        -webkit-text-stroke 0.6s var(--ease-editorial);
            will-change: margin-left, color;
        }

        /* Designing - Solid Black */
        .t-designing {
            color: var(--ink);
            margin-left: -0.2em;
        }

        /* Digital - Outline */
        .t-digital {
            color: transparent;
            -webkit-text-stroke: 1.5px var(--ink);
            margin-left: 0.8em;
            z-index: 2;
        }

        /* Planetarium - Solid Forest Green */
        .t-planetarium {
            color: var(--forest-green);
            margin-left: 0.35em;
        }

        /* 
           FEATURE: Row Hover Interaction 
           Aligns text and swaps colors.
        */
        .portfolio-row:hover .t-designing,
        .portfolio-row:hover .t-digital,
        .portfolio-row:hover .t-planetarium {
            margin-left: 0;
        }

        .portfolio-row:hover .t-digital {
            -webkit-text-stroke-color: var(--forest-green);
        }

        .portfolio-row:hover .t-planetarium {
            color: var(--lavender);
        }

        /* Meta Content Section */
        .meta-col {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            padding-bottom: 0.5rem; /* Align visual baseline with title */
        }

        .project-description {
            font-size: 1.05rem;
            line-height: 1.6;
            color: var(--ink-muted);
            border-left: 2px solid var(--forest-green);
            padding-left: 1.5rem;
            max-width: 40ch;
        }

        .tags {
            display: flex;
            gap: 0.75rem;
        }

        .tag {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            padding: 8px 14px;
            display: inline-block;
            line-height: 1;
        }

        .tag.tag-lavender {
            background-color: var(--lavender);
            color: var(--ink);
        }

        .tag.tag-black {
            background-color: var(--ink);
            color: #fff;
        }

        /* 
           FEATURE: Panoramic Image Container 
           Specific 50% / 4% border radius for the gentle curve.
        */
        .image-pano-wrapper {
            width: 100%;
            position: relative;
            /* Aspect ratio approx 3:1 */
            aspect-ratio: 3.2 / 1;
            /* The specific curve requested */
            border-radius: 50% / 4%;
            overflow: hidden;
            background-color: #DCD9D0;
            transition: transform 0.8s var(--ease-editorial);
        }
        
        /* Subtle scale on hover */
        .portfolio-row:hover .image-pano-wrapper {
            transform: scale(1.005);
        }

        /* 
           FEATURE: CSS-constructed "Dashboard" Placeholder 
           Creating a realistic looking dashboard without external images.
        */
        .dashboard-ui {
            width: 110%; /* Slightly wider for parallax */
            height: 110%;
            position: absolute;
            top: -5%;
            left: -5%;
            background-color: #050505;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: 
                linear-gradient(rgba(39, 94, 72, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(39, 94, 72, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            transition: transform 0.2s cubic-bezier(0.1, 0.5, 0.5, 1);
        }

        /* Decorative UI Elements */
        .ui-grid-center {
            width: 60%;
            height: 70%;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
            display: flex;
            justify-content: space-between;
            padding: 2rem;
        }

        .ui-circle-main {
            width: 15rem;
            height: 15rem;
            border-radius: 50%;
            border: 1px dashed var(--lavender);
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(200, 180, 255, 0.05);
        }

        .ui-circle-inner {
            width: 80%;
            height: 80%;
            border-radius: 50%;
            border: 1px solid var(--forest-green);
            opacity: 0.5;
        }

        .ui-data-col {
            display: flex;
            flex-direction: column;
            gap: 10px;
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--forest-green);
            text-transform: uppercase;
        }

        .ui-bar {
            width: 100px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
        }
        
        .ui-bar::after {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 40%;
            background: var(--yellow);
        }

        .ui-label {
            position: absolute;
            color: #fff;
            font-family: var(--font-display);
            font-size: 4rem;
            opacity: 0.1;
            z-index: 0;
            letter-spacing: 5px;
        }

        /* 
           FEATURE: Responsive Styles 
           Collapse to single column under 860px
        */
        @media (max-width: 860px) {
            .content-grid {
                grid-template-columns: 1fr;
                gap: 2rem;
            }

            .meta-col {
                padding-bottom: 0;
            }

            .project-description {
                max-width: 100%;
            }

            .image-pano-wrapper {
                aspect-ratio: 2/1; /* Taller on mobile for visibility */
                border-radius: 12px; /* Fallback for curve on small screens if needed, but keeping curve is cooler */
                border-radius: 50% / 3%;
            }
        }
    </style>
</head>
<body>

    <!-- FEATURE: Main Portfolio Row Container -->
    <article class="portfolio-row" id="row-shanghai">
        
        <!-- FEATURE: Top Content Grid (Title Left, Meta Right) -->
        <div class="content-grid">
            <h2 class="project-title">
                <span class="title-line t-designing">Designing</span>
                <span class="title-line t-digital">Digital</span>
                <span class="title-line t-planetarium">Planetarium</span>
            </h2>

            <div class="meta-col">
                <p class="project-description">
                    Creating large-scale screen experiences for immersive science exhibitions — translating complex astrophysical data into visual wonder.
                </p>
                <div class="tags">
                    <span class="tag tag-lavender">Installation</span>
                    <span class="tag tag-black">Shanghai</span>
                </div>
            </div>
        </div>

        <!-- FEATURE: Curved Panoramic Image Area -->
        <figure class="image-pano-wrapper" id="pano-wrapper">
            <!-- 
                FEATURE: Abstract Dashboard UI Construction
                This replaces a static image with an HTML/CSS composition representing the project.
            -->
            <div class="dashboard-ui" id="dashboard-ui">
                <div class="ui-label" style="top: 20%; left: 10%;">ORBIT</div>
                <div class="ui-label" style="bottom: 20%; right: 10%;">DATA</div>
                
                <div class="ui-grid-center">
                    <div class="ui-data-col">
                        <span>SYS_TRAJ_01</span>
                        <div class="ui-bar" style="width:120px"><div style="width:70%; background:var(--lavender)"></div></div>
                        <span>VELOCITY</span>
                        <div class="ui-bar"></div>
                    </div>
                    
                    <!-- Central Planetarium Element -->
                    <div class="ui-circle-main">
                        <div class="ui-circle-inner"></div>
                        <div style="position:absolute; width: 4px; height: 4px; background:white; border-radius:50%; box-shadow: 0 0 10px white;"></div>
                    </div>

                    <div class="ui-data-col" style="align-items: flex-end;">
                        <span>ALTITUDE</span>
                        <div class="ui-bar" style="width:80px"></div>
                        <span>AZIMUTH</span>
                        <div class="ui-bar" style="width:140px"></div>
                    </div>
                </div>
            </div>
        </figure>
    </article>

    <script>
        // FEATURE: Parallax Dashboard Effect
        // Adds liveliness to the static prototype by dragging the dashboard slightly opposite to mouse movement.
        
        const row = document.getElementById('row-shanghai');
        const dashboard = document.getElementById('dashboard-ui');
        
        row.addEventListener('mousemove', (e) => {
            const rect = row.getBoundingClientRect();
            // Calculate mouse position relative to center of row
            // -1 to 1 range
            const xVal = (e.clientX - rect.left - (rect.width / 2)) / (rect.width / 2);
            const yVal = (e.clientY - rect.top - (rect.height / 2)) / (rect.height / 2);
            
            // Apply subtle translation
            // Constraint movement to small values to simulate distance
            const xOffset = xVal * -20; // Move 20px max
            const yOffset = yVal * -10; // Move 10px max

            dashboard.style.transform = `translate(${xOffset}px, ${yOffset}px)`;
        });

        // Reset on mouse leave
        row.addEventListener('mouseleave', () => {
            dashboard.style.transform = `translate(0px, 0px)`;
        });
    </script>
</body>
</html>
