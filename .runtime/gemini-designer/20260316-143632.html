<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Designer Portfolio - Row 1 Redesign</title>
    <style>
        /* --------------------------------------------------------------------------
           RESET & VARIABLES
           -------------------------------------------------------------------------- */
        :root {
            /* Palette */
            --forest: #275E48;
            --bg: #EDEBE6;     /* Warm off-white */
            --yellow: #FFD600; /* Sticker yellow */
            --ink: #0D0D0D;    /* Deep black */
            --white: #FFFFFF;

            /* Typography Configuration */
            --font-display: 'Antonio', 'Impact', sans-serif; /* Modeling Mango Grotesque */
            --font-body: 'Outfit', sans-serif;
            --font-mono: 'Space Mono', monospace;

            /* Spacing */
            --gutter: clamp(1rem, 4vw, 2rem);
            --radius-lg: 12px;
            --radius-sm: 4px;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--ink);
            font-family: var(--font-body);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* --------------------------------------------------------------------------
           FONTS IMPORT
           Using Antonio for that condensed display look (Mango proxy),
           Outfit for body, Space Mono for details.
           -------------------------------------------------------------------------- */
        @import url('https://fonts.googleapis.com/css2?family=Antonio:wght@700&family=Outfit:wght@300;400;500&family=Space Mono:ital,wght@0,400;0,700;1,400&display=swap');

        /* --------------------------------------------------------------------------
           LAYOUT: ROW 1 CONTAINER
           -------------------------------------------------------------------------- */
        .wrapper {
            width: 100%;
            max-width: 1200px;
            padding: var(--gutter);
        }

        .service-row {
            display: grid;
            grid-template-columns: 140px 1fr; /* Fixed width graphic, flex text */
            gap: clamp(2rem, 5vw, 4rem);
            align-items: start;
            position: relative;
            padding: clamp(3rem, 6vh, 5rem) 0;
            border-top: 1px solid rgba(13, 13, 13, 0.1);
            border-bottom: 1px solid rgba(13, 13, 13, 0.1);
        }

        /* Responsive Layout Switch */
        @media (max-width: 768px) {
            .service-row {
                grid-template-columns: 1fr;
                gap: 2rem;
            }
        }

        /* --------------------------------------------------------------------------
           THE GRAPHIC (VERTICAL GREEN BLOCK)
           -------------------------------------------------------------------------- */
        .graphic-totem {
            background-color: var(--forest);
            color: var(--white);
            /* Portrait Rectangle */
            width: 100%;
            aspect-ratio: 9 / 16; 
            max-width: 160px; /* Cap width for large screens */
            border-radius: var(--radius-lg);
            
            /* Internals */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            isolation: isolate;
            overflow: hidden;
            
            /* Visual Depth */
            box-shadow: 0 20px 40px -10px rgba(39, 94, 72, 0.3);
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.4s ease;
        }

        /* Interaction State */
        .service-row:hover .graphic-totem {
            transform: translateY(-8px);
            box-shadow: 0 30px 60px -12px rgba(39, 94, 72, 0.4);
        }

        .totem-text {
            font-family: var(--font-display);
            font-size: clamp(3rem, 8vw, 5rem); 
            line-height: 0.85;
            text-align: center;
            letter-spacing: -0.02em;
            display: flex;
            flex-direction: column;
            
            /* Breathing room logic: ensure it never hits the edge */
            margin: auto; 
            padding: 1.5rem; 
        }

        .totem-char {
            display: block;
            opacity: 0.95;
            transition: transform 0.3s ease;
        }

        /* Subtle parallax feel on hover */
        .service-row:hover .totem-char:nth-child(1) { transform: translateY(-3px); }
        .service-row:hover .totem-char:nth-child(2) { transform: translateY(3px); }

        /* --------------------------------------------------------------------------
           CONTENT AREA
           -------------------------------------------------------------------------- */
        .content-stack {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            position: relative;
        }

        /* The Header Group: Title + Sticker */
        .header-group {
            display: flex;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 1rem;
            position: relative;
        }

        .display-title {
            font-family: var(--font-display);
            font-size: clamp(3.5rem, 7vw, 6.5rem);
            line-height: 0.9;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--ink);
            /* Optical adjustment for all caps condensed */
            letter-spacing: 0.01em; 
            margin-top: -0.2em; /* Align cap-height with other elements */
        }

        /* The "First Principles" Sticker */
        .sticker-tag {
            background-color: var(--yellow);
            color: var(--ink);
            font-family: var(--font-mono);
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            padding: 0.5rem 1rem;
            
            /* Sticker Physics */
            transform: rotate(-3deg) translateY(10px);
            box-shadow: 2px 4px 10px rgba(0,0,0,0.1);
            border: 1px solid rgba(0,0,0,0.05);
            
            /* Positioning relative to title */
            margin-left: 1rem;
            flex-shrink: 0;
            cursor: default;
            user-select: none;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .sticker-tag:hover {
            transform: rotate(2deg) scale(1.05) translateY(10px);
        }

        /* --------------------------------------------------------------------------
           BODY TEXT
           -------------------------------------------------------------------------- */
        .body-copy {
            font-family: var(--font-body);
            font-size: clamp(1rem, 1.2vw, 1.25rem);
            line-height: 1.6;
            color: #444;
            max-width: 55ch;
            margin-top: 1rem;
            opacity: 0; /* JS Animation Starting State */
            transform: translateY(10px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .js-visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* MICRO-INTERACTION ELEMENTS */
        .guide-line {
            width: 1px;
            height: 0;
            background: var(--forest);
            position: absolute;
            left: -2rem;
            top: 0;
            opacity: 0.3;
        }

    </style>
</head>
<body>

    <div class="wrapper">
        <!-- FEATURE: Main Service Row Component -->
        <article class="service-row" id="row-1">
            
            <!-- FEATURE: Vertical Decorative Graphic -->
            <!-- Design Note: Vertical stack (flex-col) inside ensures narrow portrait ratio fits the large type comfortably -->
            <div class="graphic-totem" aria-hidden="true">
                <div class="totem-text">
                    <span class="totem-char">R</span>
                    <span class="totem-char">E</span>
                </div>
            </div>

            <!-- FEATURE: Content Stack (Title + Sticker + Description) -->
            <div class="content-stack">
                <div class="header-group">
                    <h2 class="display-title">Thinking<br>Experience</h2>
                    <div class="sticker-tag">First Principles</div>
                </div>
                
                <p class="body-copy">
                    Deconstructing complexity into clear, actionable logic. I strip away the decorative noise to reveal the core utility of a digital product, ensuring every interaction feels inevitable rather than just invented.
                </p>
            </div>
        </article>
    </div>

    <script>
        // --------------------------------------------------------------------------
        // INTERACTIONS
        // 1. Entrance Observer: Fades in text when scrolled into view.
        // 2. Cursor Tracking: Adds a subtle 3D tilt to the Green Totem based on mouse position.
        // --------------------------------------------------------------------------

        document.addEventListener('DOMContentLoaded', () => {
            
            const row = document.getElementById('row-1');
            const totem = row.querySelector('.graphic-totem');
            const chars = row.querySelectorAll('.totem-char');
            const bodyText = row.querySelector('.body-copy');

            // 1. Entrance Animation
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        // Stagger the reveal 
                        setTimeout(() => bodyText.classList.add('js-visible'), 200);
                    }
                });
            }, { threshold: 0.2 });

            observer.observe(row);

            // 2. Mouse Interaction (Subtle Parallax / Tilt)
            // We calculate the mouse position relative to the center of the totem
            totem.addEventListener('mousemove', (e) => {
                const rect = totem.getBoundingClientRect();
                const x = e.clientX - rect.left; // x position within the element.
                const y = e.clientY - rect.top;  // y position within the element.
                
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                
                // Calculate percentage from center (-1 to 1)
                const percentX = (x - centerX) / centerX;
                const percentY = (y - centerY) / centerY;

                // Rotate the block slightly
                const rotateX = percentY * -5; // tilt up/down
                const rotateY = percentX * 5;  // tilt left/right

                totem.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.02)`;
                
                // Move text in opposition for depth
                chars[0].style.transform = `translateX(${percentX * -4}px) translateY(${percentY * -4}px)`;
                chars[1].style.transform = `translateX(${percentX * -2}px) translateY(${percentY * -2}px)`;
            });

            // Reset on mouse leave
            totem.addEventListener('mouseleave', () => {
                totem.style.transform = `perspective(1000px) rotateX(0) rotateY(0) scale(1)`;
                chars.forEach(char => {
                    char.style.transform = `translate(0,0)`;
                });
            });
        });
    </script>
</body>
</html>
