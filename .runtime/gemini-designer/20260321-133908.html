<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIN - Digital Product Designer</title>
    
    <!-- Fonts via Google Fonts to simulate specified typography -->
    <!-- 'Antonio' used as proxy for 'Mango Grotesque' (Condensed Display) -->
    <!-- 'Outfit' and 'Space Mono' included as requested -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Antonio:wght@700&family=Outfit:wght@300;400;500&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        :root {
            --ink: #0D0D0D;
            --white: #FFFFFF;
            --indigo: #6366F1;
            
            --font-display: 'Antonio', sans-serif; /* Proxy for Mango Grotesque */
            --font-body: 'Outfit', sans-serif;
            --font-mono: 'Space Mono', monospace;
            
            --gutter: 2rem;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--white);
            color: var(--ink);
            font-family: var(--font-body);
            overflow-x: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* --- GRID SYSTEM --- */
        .layout-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 1rem;
            padding: 0 var(--gutter);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Let clicks pass through */
            z-index: 0;
        }

        /* Decoration: Faint Grid Lines */
        .grid-line {
            grid-column: span 1;
            border-right: 1px solid rgba(13, 13, 13, 0.03);
            height: 100%;
        }
        .grid-line:last-child { border-right: none; }

        /* --- NAVIGATION (Pre-defined structure) --- */
        .nav-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 2rem var(--gutter);
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            align-items: flex-start;
            z-index: 100;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .nav-brand {
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-brand::before {
            content: '';
            display: block;
            width: 8px;
            height: 8px;
            background-color: var(--indigo);
        }

        .nav-links {
            justify-self: center;
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links li { opacity: 0.6; }
        .nav-links li.active { opacity: 1; text-decoration: underline; text-decoration-thickness: 1px;}
        
        .nav-status-group {
            justify-self: end;
            display: flex;
            flex-direction: column; 
            align-items: flex-end;
            gap: 0.5rem;
        }

        .status-dot-container {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: #10B981; /* Green for available */
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);
        }

        /* --- FEATURE: Language Toggle --- */
        /* Design: Editorial, pill-like but minimal, slash separator */
        .lang-toggle {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            border: 1px solid rgba(13, 13, 13, 0.15);
            padding: 4px 12px;
            border-radius: 100px; /* Pill shape */
            display: inline-flex;
            gap: 8px;
            margin-top: 10px; /* Spacing from status */
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(5px);
        }
        
        .lang-opt {
            cursor: pointer;
            transition: color 0.2s;
        }
        
        .lang-opt.active {
            color: var(--indigo);
            font-weight: 700;
        }
        
        .lang-opt.inactive {
            color: rgba(13, 13, 13, 0.4);
        }
        
        .lang-divider {
            color: rgba(13, 13, 13, 0.2);
        }

        /* --- HERO MAIN SECTION --- */
        .hero-section {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            z-index: 10;
        }

        /* --- TYPOGRAPHY LAYOUT --- */
        .hero-content {
            margin-left: 15vw; /* Offset calculation */
            position: relative;
        }

        /* "Hi, I'm LIN" - Eyebrow text */
        .intro-lead {
            font-family: var(--font-body);
            font-size: 1.1rem;
            margin-bottom: 0rem; 
            margin-left: 0.5rem; /* Slight optical alignment */
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        /* Decoration: Small rule line next to intro */
        .intro-lead::after {
            content: '';
            display: block;
            width: 40px;
            height: 1px;
            background-color: var(--ink);
        }

        /* Staircase Headline */
        .headline-block {
            font-family: var(--font-display);
            font-size: clamp(4rem, 14vw, 12rem); /* Responsive giant type */
            line-height: 0.85;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: -0.02em;
            display: flex;
            flex-direction: column;
            
            /* Apply a slight skew/italic for momentum if desired, but sticking to Swiss rigidness */
        }

        .line-1 {
            transform: translateX(0);
        }

        .line-2 {
            transform: translateX(1.5em); /* First indent */
            color: transparent;
            -webkit-text-stroke: 2px var(--ink); /* Outline effect for contrast */
            position: relative;
        }
        
        /* FEATURE: Editorial Markers */
        /* Adding a small superscript or data point to the outlined text */
        .line-2::after {
            content: '(UX/UI)';
            font-family: var(--font-mono);
            font-size: 1rem;
            -webkit-text-stroke: 0;
            color: var(--ink);
            position: absolute;
            top: 20%;
            right: -80px;
            letter-spacing: 0;
            font-weight: 400;
        }

        .line-3 {
            transform: translateX(3em); /* Staircase effect */
            color: var(--ink);
            position: relative;
        }

        /* Decoration: Geometric Accent */
        .line-3::before {
            content: '';
            position: absolute;
            left: -0.3em;
            bottom: 0.2em;
            width: 0.2em;
            height: 0.2em;
            background-color: var(--indigo);
            border-radius: 50%;
        }

        /* --- FEATURE: Hero Decorations --- */
        
        /* 1. Technical Crosshairs in corners */
        .crosshair {
            position: absolute;
            width: 20px;
            height: 20px;
            pointer-events: none;
        }
        .crosshair::before, .crosshair::after {
            content: '';
            position: absolute;
            background-color: var(--ink);
        }
        .crosshair::before { top: 9px; left: 0; width: 100%; height: 1px; }
        .crosshair::after { left: 9px; top: 0; height: 100%; width: 1px; }
        
        .ch-br { bottom: var(--gutter); right: var(--gutter); }
        .ch-bl { bottom: var(--gutter); left: var(--gutter); }

        /* 2. Abstract Vertical Line (Visual Rhythm) */
        .rhythm-line {
            position: absolute;
            top: 20vh;
            left: 20%;
            height: 30vh;
            width: 1px;
            background: linear-gradient(to bottom, var(--ink) 0%, transparent 100%);
        }

        /* 3. Date/Coordinates Block (Editorial Style) */
        .meta-data {
            position: absolute;
            bottom: var(--gutter);
            left: var(--gutter);
            font-family: var(--font-mono);
            font-size: 0.7rem;
            line-height: 1.6;
            color: rgba(13, 13, 13, 0.6);
            border-left: 1px solid var(--ink);
            padding-left: 10px;
        }

        /* --- FEATURE: Scroll Indicator --- */
        /* Replacing circle with editorial typographic element */
        .scroll-indicator {
            position: absolute;
            bottom: 0;
            right: 15%; /* Asymmetric placement */
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .scroll-text-wrap {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            /* Rotate to read upwards */
            transform: rotate(180deg); 
        }

        .scroll-line-container {
            height: 120px;
            width: 1px;
            background-color: rgba(13, 13, 13, 0.1);
            position: relative;
            overflow: hidden;
        }

        .scroll-line-active {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 40%;
            background-color: var(--ink);
            animation: dropLine 2.5s cubic-bezier(0.77, 0, 0.175, 1) infinite;
        }

        @keyframes dropLine {
            0% { top: -100%; }
            50% { top: 0%; }
            100% { top: 100%; }
        }

        /* --- RESPONSIVE ADJUSTMENTS --- */
        @media (max-width: 768px) {
            .nav-container { grid-template-columns: 1fr auto 1fr; }
            .nav-links { display: none; } /* Simplified for mobile as per request focus on layout */
            .hero-content { margin-left: var(--gutter); }
            .headline-block { font-size: 18vw; }
            .line-2 { transform: translateX(0.5em); }
            .line-3 { transform: translateX(1em); }
            .intro-lead { margin-bottom: 0.5rem; }
            .scroll-indicator { right: var(--gutter); }
        }
    </style>
</head>
<body>

    <!-- Background Grid for Structure -->
    <div class="layout-grid">
        <div class="grid-line"></div>
        <div class="grid-line"></div>
        <div class="grid-line"></div>
        <div class="grid-line"></div>
        <div class="grid-line"></div>
        <div class="grid-line"></div>
        <div class="grid-line"></div>
        <div class="grid-line"></div>
        <div class="grid-line"></div>
        <div class="grid-line"></div>
        <div class="grid-line"></div>
        <div class="grid-line"></div>
    </div>

    <!-- Navigation Area -->
    <header class="nav-container">
        <!-- Col 1: Brand -->
        <div class="nav-brand">LIN STUDIO</div>
        
        <!-- Col 2: Links -->
        <ul class="nav-links">
            <li class="active">Work</li>
            <li>Profile</li>
            <li>Contact</li>
        </ul>
        
        <!-- Col 3: Status & Language -->
        <div class="nav-status-group">
            <div class="status-dot-container">
                <div class="status-dot"></div>
                <span>Available</span>
            </div>
            
            <!-- FEATURE: Language Toggle Button -->
            <!-- Minimal pill design, editorial font choice -->
            <div class="lang-toggle">
                <span class="lang-opt active">EN</span>
                <span class="lang-divider">/</span>
                <span class="lang-opt inactive">中</span>
            </div>
        </div>
    </header>

    <!-- Hero Content -->
    <main class="hero-section">
        
        <!-- FEATURE: Hero Decorations -->
        <!-- Visual rhythm elements: Line, Markers, Coordinates -->
        <div class="rhythm-line"></div>
        <div class="crosshair ch-bl"></div>
        <div class="crosshair ch-br"></div>
        
        <div class="meta-data">
            <div>EST. 2024</div>
            <div>[ 35.6895° N ]</div>
            <div>[ 139.6917° E ]</div>
        </div>

        <!-- Typography Layout -->
        <div class="hero-content">
            <!-- Eyebrow text -->
            <p class="intro-lead">
                Hi, I'm LIN
            </p>

            <!-- Staircase Headline -->
            <div class="headline-block">
                <span class="line-1">DESIGNING</span>
                <span class="line-2">DIGITAL</span>
                <span class="line-3">PRODUCTS</span>
            </div>
        </div>

        <!-- FEATURE: Scroll Indicator -->
        <!-- Typographic, vertical orientation, functional animation -->
        <div class="scroll-indicator">
            <div class="scroll-text-wrap">Scroll to Explore</div>
            <div class="scroll-line-container">
                <div class="scroll-line-active"></div>
            </div>
        </div>

    </main>

    <!-- JS for basic interactions to make prototype feel alive (No text-switching as requested) -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Simple interaction: Update status text based on time purely for 'live' feel
            const statusText = document.querySelector('.status-dot-container span');
            
            // Console log to simulate system start
            console.log('System initialized. LIN Portfolio v1.0');

            // Interactive Language Toggle (Visual Only)
            const langOpts = document.querySelectorAll('.lang-opt');
            langOpts.forEach(opt => {
                opt.addEventListener('click', function() {
                    // Reset all
                    langOpts.forEach(o => {
                        o.classList.remove('active');
                        o.classList.add('inactive');
                    });
                    // Set active
                    this.classList.remove('inactive');
                    this.classList.add('active');
                });
            });

            // Subtle parallax on mouse move for the decoration line
            const rhythmLine = document.querySelector('.rhythm-line');
            const headline = document.querySelector('.headline-block');
            
            document.addEventListener('mousemove', (e) => {
                const x = e.clientX / window.innerWidth;
                const y = e.clientY / window.innerHeight;
                
                // Very subtle movement
                rhythmLine.style.transform = `translate(${x * 10}px, ${y * 10}px)`;
                headline.style.transform = `translate(${x * -5}px, ${y * -5}px)`;
            });
        });
    </script>
</body>
</html>
