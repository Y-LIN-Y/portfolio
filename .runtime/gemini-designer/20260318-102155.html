<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editorial Portfolio - Row 2 Redesign</title>
    <!-- FEATURE: Import fonts defined in Design System -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Outfit:wght@300;400;500&family=Space+Mono&display=swap" rel="stylesheet">

    <style>
        /* BASE & RESET */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            /* Palette */
            --bg-color: #EDEBE6;
            --ink: #0D0D0D;
            --ink-muted: #7A7770;
            --forest: #275E48;
            --lavender: #C8B4FF;
            --yellow: #FFD600;
            --gray-placeholder: #DCD9D0;
            
            /* Typography */
            --font-display: 'Anton', sans-serif;
            --font-body: 'Outfit', sans-serif;
            --font-mono: 'Space Mono', monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--ink);
            font-family: var(--font-body);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* FEATURE: Main Grid Wrapper for Row 2 */
        .project-row {
            width: 100%;
            min-height: 100vh;
            display: grid;
            grid-template-columns: 1.1fr 0.9fr; /* Text gets slightly more space to accommodate long title */
            align-items: center;
            padding: 4rem 5vw;
            gap: 5vw;
            position: relative;
            overflow: hidden;
        }

        /* FEATURE: Text Column Positioning relative for parallax */
        .text-column {
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 10;
        }

        /* FEATURE: The 3-Line Stacked Title (Typography maintained) */
        .hero-title {
            display: flex;
            flex-direction: column;
            font-family: var(--font-display);
            text-transform: uppercase;
            /* Adjusted clamp to fit the grid column, slightly smaller max than full-width */
            font-size: clamp(3.5rem, 8vw, 9rem); 
            line-height: 0.82;
            letter-spacing: -0.02em;
            margin-bottom: 2.5rem;
            transform-style: preserve-3d;
            perspective: 1000px;
            cursor: default;
        }

        /* Utility classes for rows to target in JS */
        .title-line {
            display: block;
            width: fit-content;
            transition: color 0.3s ease, -webkit-text-stroke 0.3s ease;
            will-change: transform;
        }

        /* Line 1: DESIGNING */
        .line-1 {
            color: var(--ink);
        }

        /* Line 2: DIGITAL (Outline style) */
        .line-2 {
            color: transparent;
            -webkit-text-stroke: 1.5px var(--ink);
            /* Visual indentation for editorial rhythm */
            margin-left: 0.5em; 
        }

        /* Line 3: PLANETARIUM (Forest Green) */
        .line-3 {
            color: var(--forest);
        }

        /* FEATURE: Hover Interactions */
        .hero-title:hover .line-2 {
            -webkit-text-stroke: 1.5px var(--forest);
            color: transparent;
        }

        .hero-title:hover .line-3 {
            color: var(--lavender);
        }

        /* FEATURE: Description & Meta Container */
        .meta-wrapper {
            max-width: 480px;
            margin-left: 0.5rem; /* Slight offset to align with optical weight of title */
            opacity: 0;
            animation: fadeIn 1s ease 0.5s forwards;
            /* Create a sub-grid or flex for tags/desc */
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .description {
            font-family: var(--font-body);
            font-size: 1.125rem;
            line-height: 1.5;
            color: var(--ink-muted);
            font-weight: 300;
        }

        /* FEATURE: Tag System (No borders, solid fill, sharp corners) */
        .tags {
            display: flex;
            gap: 1rem;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .tag {
            padding: 0.5rem 1rem;
            border-radius: 0px; /* Sharp corners */
            font-weight: 500;
        }

        .tag.lavender {
            background-color: var(--lavender);
            color: var(--ink);
        }

        .tag.black {
            background-color: var(--ink);
            color: #FFF;
        }

        /* FEATURE: Image Column & Placeholder */
        .image-column {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-wrapper {
            width: 100%;
            max-width: 550px;
            aspect-ratio: 4/5;
            background-color: var(--gray-placeholder);
            position: relative;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            will-change: transform;
            /* Shadow for depth against the creamy bg */
            box-shadow: 20px 20px 0px rgba(0,0,0,0.05); 
        }

        .placeholder-text {
            font-family: var(--font-mono);
            color: var(--ink-muted);
            font-size: 0.875rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            z-index: 2;
        }

        /* Abstract shape overlay for realism */
        .image-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(45deg, rgba(0,0,0,0.05) 25%, transparent 25%, transparent 50%, rgba(0,0,0,0.05) 50%, rgba(0,0,0,0.05) 75%, transparent 75%, transparent);
            background-size: 20px 20px;
            opacity: 0.3;
        }

        /* Animations */
        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile Responsive */
        @media (max-width: 900px) {
            .project-row {
                grid-template-columns: 1fr;
                gap: 3rem;
                padding-top: 6rem;
            }
            .hero-title {
                font-size: clamp(3rem, 13vw, 6rem);
            }
            .line-2 { margin-left: 0; }
            .image-wrapper { max-width: 100%; aspect-ratio: 16/9; }
        }
    </style>
</head>
<body>

    <!-- FEATURE: Row 2 Container -->
    <section class="project-row" id="row2">
        
        <!-- FEATURE: Left Column - Typography & Meta -->
        <div class="text-column">
            
            <!-- Stacked Title -->
            <h2 class="hero-title">
                <span class="title-line line-1" data-speed="20">Designing</span>
                <span class="title-line line-2" data-speed="40">Digital</span>
                <span class="title-line line-3" data-speed="60">Planetarium</span>
            </h2>

            <!-- Description + Tags Block (New Layout Requirement) -->
            <div class="meta-wrapper">
                <p class="description">
                    Creating large-scale screen experiences for immersive science exhibitions — translating complex astrophysical data into visual wonder.
                </p>
                
                <div class="tags">
                    <div class="tag lavender">Installation</div>
                    <div class="tag black">Shanghai</div>
                </div>
            </div>

        </div>

        <!-- FEATURE: Right Column - Image Placeholder -->
        <div class="image-column">
            <div class="image-wrapper" id="projectImage" data-speed="-30">
                <div class="image-overlay"></div>
                <!-- Placeholder text simulating an image -->
                <span class="placeholder-text">Project Image</span>
            </div>
        </div>

    </section>

    <script>
        // FEATURE: Micro-interaction Logic (Parallax)
        // Tracks mouse movement to shift typographic layers and image

        const row = document.getElementById('row2');
        const lines = document.querySelectorAll('.title-line');
        const image = document.getElementById('projectImage');

        let mouseX = 0;
        let wWidth = window.innerWidth;
        
        // Optimize resizing
        window.addEventListener('resize', () => {
            wWidth = window.innerWidth;
        });

        // Track global mouse position for the parallax effect logic
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            requestAnimationFrame(animateParallax);
        });

        function animateParallax() {
            // Calculate cursor position as a percentage from center (-1 to 1)
            // 0 is center, -1 is left edge, 1 is right edge
            const xDecimal = (mouseX / wWidth) - 0.5;

            // Animate Text Lines
            lines.forEach(line => {
                // Get speed from data attribute, default to 20 if missing
                const speed = parseFloat(line.getAttribute('data-speed')) || 20;
                
                // Calculate translateX. 
                // We keep it subtle: offset * speed * dampening
                const xPos = xDecimal * speed * 2; 

                line.style.transform = `translateX(${xPos}px)`;
            });

            // Animate Image (Opposite direction defined in data-speed negative value)
            if(image) {
                const imgSpeed = parseFloat(image.getAttribute('data-speed')) || -30;
                const imgX = xDecimal * imgSpeed * 1.5;
                
                // Adding a slight rotation for extra "organic" editorial feel
                const rotate = xDecimal * 2; 
                
                image.style.transform = `translateX(${imgX}px) rotateY(${rotate}deg)`;
            }
        }
    </script>
</body>
</html>
