<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linyun Yu — UX/UI Portfolio</title>
    <!-- Importing a condensed font to mimic Mango Grotesque/Impact style -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet">
    
    <style>
        /* 
         * DESIGN SYSTEM & RESET 
         */
        :root {
            --bg-color: #FFFFFF;
            --text-color: #0D0D0D;
            --accent-color: #B8A44C; /* Olive/Gold */
            --font-display: 'Oswald', 'Impact', 'Arial Narrow', sans-serif;
            --ease-out-expo: cubic-bezier(0.19, 1, 0.22, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-display);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 
         * HERO SECTION WRAPPER 
         */
        .hero-section {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 2vw;
        }

        /* 
         * EDITORIAL MARKERS 
         */
        .marker {
            position: absolute;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            font-weight: 500;
            text-transform: uppercase;
            z-index: 10;
        }

        .marker.top-left {
            top: 2rem;
            left: 2rem;
        }

        .marker.top-right {
            top: 2rem;
            right: 2rem;
            font-weight: 700;
            border: 1px solid var(--text-color);
            padding: 0.2rem 0.5rem;
        }

        .side-quote {
            position: absolute;
            right: 2rem;
            bottom: 20%;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            opacity: 0; 
            animation: fadeIn 1s 1.5s var(--ease-out-expo) forwards;
        }

        /* 
         * GEOMETRIC SHAPES (BACKGROUND)
         */
        .graphic-circle {
            position: absolute;
            width: 35vw;
            height: 35vw;
            background-color: var(--text-color);
            border-radius: 50%;
            top: 15%;
            right: 15%;
            z-index: 1; /* Behind text? No, reference says overlapping behind text lines but visually impactful */
            /* We will place it behind with z-index 1, text will be 2 */
            transform: scale(0); /* Initial state for animation */
            pointer-events: none;
        }

        /* 
         * MAIN TYPOGRAPHY STACK 
         */
        .typo-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 1600px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            /* Adjust line-height to make it tight like the reference */
            line-height: 0.82; 
        }

        .typo-line {
            display: block;
            font-size: 13vw; /* Massive */
            font-weight: 700;
            text-transform: uppercase;
            white-space: nowrap;
            opacity: 0; /* Hidden for reveal */
            letter-spacing: -0.02em;
            position: relative;
            /* Allow mix-blend-mode to interact with circle if desired, 
               but reference implies clean overlap. We'll use layer stacking. */
        }

        /* Individual Line Styling & Offsets for "Staircase" effect */
        .line-1 {
            /* LINYUN */
            margin-left: 2vw;
            transform: translateY(100px);
        }

        .line-2 {
            /* YU */
            margin-left: 18vw;
            color: var(--text-color);
            transform: translateY(100px);
            z-index: 3;
        }

        /* The Gold Accent Rectangle */
        .accent-highlight {
            position: absolute;
            background-color: var(--accent-color);
            width: 0.7em;
            /* Height matches font approx */
            height: 0.65em;
            bottom: 0.12em;
            left: -0.05em;
            z-index: -1;
            /* Skew slightly for brutalist feel */
            transform: skewX(-5deg);
        }

        .line-3 {
            /* MULTI- */
            margin-left: 0;
            /* Overlaps the circle intentionally */
            color: var(--text-color); /* Might need mix-blend-mode difference if circle is black and text is black? No, text is black, circle is black. 
            Wait, if text is black and circle is black, it won't show.
            Let's apply a text-stroke or change color for overlap. 
            Correction: Re-reading reference. "Large black filled circle... overlapping behind". 
            If text is black and circle is black, shape is lost. 
            Strategy: Layout lines such that they partially overlap but remain readable, or use white text where overlapping circle. */
            
            /* Dynamic Masking Trick for Black on Black overlap:
               We will use mix-blend-mode: difference for the text that overlaps the circle? 
               Difference on white bg = inverted (black). Difference on black bg = white.
               Perfect. */
            mix-blend-mode: difference;
            color: #fff; /* Base color needs to be white for difference mode to result in black on white BG */
            
            transform: translateY(100px);
        }
        
        /* Resetting mix-blend-mode issues for non-overlapping parts 
           Actually, mix-blend-mode: difference with white text:
           - On White BG: White difference White = Black Text.
           - On Black Circle: White difference Black = White Text.
           This solves the overlap legibility perfectly.
        */
        
        .typo-wrapper {
            /* Wrapper to hold mix-blend-mode isolated from other elements if needed */
            isolation: isolate;
        }

        /* Apply the mix-blend approach globally to the text for consistency */
        .typo-line {
            color: #fff;
            mix-blend-mode: difference;
        }
        
        /* The accent needs to handle the blend mode carefully */
        .line-2 span.real-text {
             position: relative;
        }

        .line-4 {
            /* DISCIPLINED */
            margin-left: 12vw;
            transform: translateY(100px);
        }

        .line-5 {
            /* DESIGNER */
            margin-left: 35vw;
            transform: translateY(100px);
        }

        /* 
         * SCROLL INDICATOR
         */
        .scroll-indicator {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            animation: fadeIn 1s 2s var(--ease-out-expo) forwards;
            cursor: pointer;
        }

        .scroll-circle {
            width: 50px;
            height: 50px;
            border: 1px solid var(--text-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            transition: transform 0.3s ease;
        }

        .scroll-arrow {
            width: 1px;
            height: 15px;
            background: var(--text-color);
            position: relative;
        }
        
        .scroll-arrow::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: -3px;
            width: 6px;
            height: 6px;
            border-bottom: 1px solid var(--text-color);
            border-right: 1px solid var(--text-color);
            transform: rotate(45deg);
        }

        .scroll-text {
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        /* 
         * ANIMATIONS 
         */
        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @keyframes revealText {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes growCircle {
            to { transform: scale(1); }
        }

        /* Utility for dummy content below */
        .content-section {
            height: 100vh;
            background: #f4f4f4;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            text-transform: uppercase;
            color: #ccc;
        }
        
        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .typo-line { font-size: 16vw; line-height: 0.9; }
            .line-1 { margin-left: 0; }
            .line-2 { margin-left: 10vw; }
            .line-3 { margin-left: 0; }
            .line-4 { margin-left: 5vw; }
            .line-5 { margin-left: 0; text-align: right; }
            .graphic-circle { width: 60vw; height: 60vw; top: 20%; right: -10%; }
            .side-quote { display: none; }
        }

    </style>
</head>
<body>

    <!-- FEATURE: Navigation / Top Markers -->
    <nav>
        <div class="marker top-left">Linyun Yu &copy; 2024</div>
        <div class="marker top-right">AD</div>
    </nav>

    <!-- FEATURE: Main Hero Section -->
    <section class="hero-section" id="hero">
        
        <!-- FEATURE: Decorative Graphic (Simulates the massive overlap circle) -->
        <div class="graphic-circle" id="circle"></div>

        <!-- FEATURE: Main Typography Grid -->
        <div class="typo-container typo-wrapper">
            <!-- Line 1: Name Part 1 -->
            <div class="typo-line line-1">LINYUN</div>
            
            <!-- Line 2: Name Part 2 with Gold Accent -->
            <div class="typo-line line-2">
                <span style="position:relative; z-index:1;">
                    <div class="accent-highlight"></div>
                    YU
                </span>
            </div>
            
            <!-- Line 3: Title Start -->
            <div class="typo-line line-3">MULTI&mdash;</div>
            
            <!-- Line 4: Title Middle -->
            <div class="typo-line line-4">DISCIPLINED</div>
            
            <!-- Line 5: Title End -->
            <div class="typo-line line-5">DESIGNER.</div>
        </div>

        <!-- FEATURE: Sidebar Vertical Quote -->
        <div class="side-quote">GOOD DESIGN IS HONEST</div>

        <!-- FEATURE: Scroll Indicator -->
        <div class="scroll-indicator" onclick="window.scrollTo({top: window.innerHeight, behavior: 'smooth'})">
            <div class="scroll-circle">
                <div class="scroll-arrow"></div>
            </div>
            <span class="scroll-text">Scroll</span>
        </div>
    </section>

    <!-- FEATURE: Dummy Content for Scroll Effect -->
    <section class="content-section">
        Selected Works 2024
    </section>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            /**
             * FEATURE: Staggered Opening Animation
             * Triggers CSS animations via JS to ensure perfect timing
             */
            const lines = document.querySelectorAll('.typo-line');
            const circle = document.querySelector('.graphic-circle');
            
            // Animate Circle Scale
            circle.style.animation = 'growCircle 1.2s cubic-bezier(0.19, 1, 0.22, 1) forwards';

            // Animate Text Lines (Staggered)
            lines.forEach((line, index) => {
                line.style.animation = `revealText 1.2s cubic-bezier(0.19, 1, 0.22, 1) forwards`;
                // 100ms delay increments
                line.style.animationDelay = `${0.2 + (index * 0.1)}s`; 
            });

            /**
             * FEATURE: Subtle Parallax Effect on Mouse Move
             * Moves the circle and text layers slightly differently to create depth
             */
            const heroSection = document.getElementById('hero');
            
            heroSection.addEventListener('mousemove', (e) => {
                const x = (e.clientX - window.innerWidth / 2) / window.innerWidth;
                const y = (e.clientY - window.innerHeight / 2) / window.innerHeight;

                // Move Circle (Background layer)
                // Constraints: Max movement 30px
                circle.style.transform = `scale(1) translate(${x * -30}px, ${y * -30}px)`;

                // Move Text (Foreground layer - moves slightly less to create depth separation)
                lines.forEach((line, i) => {
                    // subtle offset variance per line for "liquid" feel
                    const factor = 10 + (i * 2); 
                    line.style.transform = `translate(${x * factor}px, ${y * factor}px)`;
                });
            });

            /**
             * FEATURE: Scroll Interaction
             * Rotates the scroll indicator and fades out hero slightly
             */
            const scrollIndicator = document.querySelector('.scroll-circle');
            
            window.addEventListener('scroll', () => {
                const scrollY = window.scrollY;
                const opacity = 1 - (scrollY / (window.innerHeight * 0.8));
                
                // Fade out hero content
                if(scrollY < window.innerHeight) {
                    document.querySelector('.typo-container').style.opacity = opacity;
                    circle.style.opacity = opacity;
                }

                // Rotate scroll circle based on scroll
                scrollIndicator.style.transform = `rotate(${scrollY * 0.5}deg)`;
            });

            /**
             * FEATURE: Dynamic Hover Micro-interaction
             * Text strokes appear on hover for "Interactive" feel
             */
            lines.forEach(line => {
                line.addEventListener('mouseenter', () => {
                    // Temporarily disable mix-blend-mode for a solid effect on hover
                    // or add a subtle skew
                    line.style.transition = 'transform 0.3s ease';
                    // We modify the transform string manually, preserving current translate would be complex without matrix reading,
                    // so we just add a scale effect via CSS class or inline logic if clean.
                    // For simplicity in this constraints:
                    line.style.letterSpacing = '0.02em'; // slight expansion
                    line.style.transition = 'letter-spacing 0.3s ease';
                });
                line.addEventListener('mouseleave', () => {
                    line.style.letterSpacing = '-0.02em';
                });
            });
        });
    </script>
</body>
</html>
