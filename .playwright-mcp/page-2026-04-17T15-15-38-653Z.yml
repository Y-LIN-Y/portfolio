          - 'heading "QR code: making arrival the entry point" [level=3] [ref=e118]'
        - paragraph [ref=e120]: One hour before kickoff, the invite card CTA shifts to prompt scanning a QR code at the pub table, which opens directly to the Social Live page for that match. Rather than asking users to navigate there themselves, physically arriving at the venue becomes the trigger for entering the in-app experience.
    - generic [ref=e122]:
      - generic [ref=e123]:
        - generic [ref=e124]:
          - generic [ref=e125]: "04"
          - 'heading "Gamification: turning natural behaviour into in-app interaction" [level=3] [ref=e126]'
        - paragraph [ref=e128]: During the match, users can shake their phones to cheer for their team, earning points redeemable for pub discounts or merchandise. The design logic was to register and reward behaviours that already happen naturally at a pub, shouting and reacting, rather than introducing an entirely new action.
