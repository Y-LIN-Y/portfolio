  - generic [ref=e80]:
    - generic [ref=e81]: Design Thinking
    - generic [ref=e83]:
      - generic [ref=e84]:
        - generic [ref=e85]: "01"
        - heading "Free social features as the entry point" [level=3] [ref=e86]
      - paragraph [ref=e89]: Subscription cost was the main barrier identified in research. The Social features were designed to be free, removing the need for a personal subscription to participate. Watching at a pub handles content access, while the app organises and enhances the social experience around it, creating an ongoing touchpoint between the brand and younger audiences.
    - generic [ref=e90]:
      - generic [ref=e91]:
        - generic [ref=e92]:
          - generic [ref=e93]: "02"
          - 'heading "Social module: closing the loop on planning a watch party" [level=3] [ref=e94]'
        - generic [ref=e96]:
          - paragraph [ref=e97]: The Social module has two tabs, Community and Invites. Invites lets users plan a pub viewing session within the app, choosing a venue, time, and friend group. Friends receive the invite, can accept it, and book seats without leaving the app.
          - paragraph [ref=e98]: The core design challenge was state management. The same invite card needed to show different information and actions depending on the viewer (sender or recipient) and the moment (sent, accepted, one hour before kickoff, at the venue). The solution was a single card component that adapts through changes in button labels and supporting details, keeping the experience consistent across every state without requiring users to reorient themselves.
      - generic [ref=e99]:
