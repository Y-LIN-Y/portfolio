      - generic [ref=e48]: Research
      - generic [ref=e49]:
        - img "Service safari pub observation photo" [ref=e50]
        - paragraph [ref=e51]: "Image 1: Service safari - pub observation photo"
      - paragraph [ref=e53]: The team conducted semi-structured interviews with 14 university students aged 18-25, spanning participants from the UK, India, China, and Mexico, alongside a service safari at a local pub to observe real watching behaviour in context. Findings were synthesised through affinity mapping into 7 key insights.
      - paragraph [ref=e55]: The most significant finding was that younger fans are driven by social context rather than football content itself. Cost was the other major barrier, with most participants sharing someone else's subscription. These two findings shifted the design direction away from content recommendation and toward bringing the social experience of watching live football into the app.
