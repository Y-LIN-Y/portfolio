          - heading "A concept for phone-to-screen interaction" [level=3] [ref=e142]
        - paragraph [ref=e144]: As a conceptual extension, the pub's large screen could display a live cheer battle, showing real-time support levels for each team. The thinking was to make individual interactions on personal devices visible in the shared physical space, turning separate participation into a collective in-venue moment.
