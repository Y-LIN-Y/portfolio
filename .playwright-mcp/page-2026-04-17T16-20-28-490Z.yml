        - text: The museum's operational data was spread across
        - strong [ref=e49]: 7 separate systems
        - text: . This project was about bringing it all into one spatially-anchored interface where problems could be spotted at a glance.
      - paragraph [ref=e50]: "I designed the entire system end-to-end: the large-screen dashboard with 7 functional modules, plus a companion mobile app for alert response and on-the-go data access."
  - generic [ref=e52]:
    - generic [ref=e53]: Design Thinking / 设计思路
    - generic [ref=e54]:
      - generic [ref=e55]:
        - generic [ref=e56]: "01"
        - heading "Anchoring Data to Physical Space" [level=3] [ref=e57]
        - paragraph [ref=e58]: The museum spans three floors (B1, F1, F2), with cameras, fire sensors, and HVAC units distributed across all of them. A flat map can't express floor relationships and spatial positions simultaneously. The 3D model, paired with a floor-switching control, ties each data point to its physical location—making it immediately clear where an issue is.
      - generic [ref=e59]:
        - generic [ref=e60]: "02"
        - heading "Right Visualization for Each Data Type" [level=3] [ref=e61]
        - paragraph [ref=e62]: "The 7 modules each deal with fundamentally different data: visitor trends, sensor readings, alarm events, equipment status, energy comparisons. Rather than applying one template, I matched each to its best-fit visualization—line charts for trends, ring charts for proportions, color-coded tables for status, annotated points on the 3D model for spatial distribution."
      - generic [ref=e63]:
        - generic [ref=e64]: "03"
        - heading "Visual Hierarchy for Large Screens" [level=3] [ref=e65]
        - paragraph [ref=e66]: The dashboard is viewed from several meters away—you can't read it like a webpage. Key metrics (4,800 daily visitors, 1.38M kWh monthly electricity) need oversized typography and high contrast. Secondary details like device logs and event tables recede with smaller type and muted colors. The dark background also required careful color calibration.
      - generic [ref=e67]:
        - generic [ref=e68]: "04"
        - heading "Symmetrical Layout for Scanning" [level=3] [ref=e69]
        - paragraph [ref=e70]: On a large screen, the eye naturally goes to the center first, then out to the sides. Center is always the spatial view, sides are always data panels. Switching modules doesn't require relearning the layout. The two sides also naturally separate data dimensions—electricity vs. water for Energy, device stats vs. personnel events for Security.
      - generic [ref=e71]:
        - generic [ref=e72]: "05"
        - heading "7 Focused Modules vs. One Dense Screen" [level=3] [ref=e73]
        - paragraph [ref=e74]: Operations, environment, security, mechanical, fire, energy—these are fundamentally different domains with little overlap. Combining them on one screen would exceed readable limits. Seven modules, each focused on one dimension with a shared navigation bar, balance completeness against cognitive load. The Overview page serves as the consolidated entry point.
