    - generic [ref=e31]:
      - paragraph [ref=e32]: The Shanghai Astronomy Museum is one of China's largest and most-visited science museums, with multiple exhibition halls, theaters, and public facilities spread across a large campus.
      - paragraph [ref=e33]: The management team needed a centralized way to monitor visitor flow, building systems, security, and energy usage — all from a single large-format display in the control room.
