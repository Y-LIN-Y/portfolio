<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio PDF | Linyun Yu</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #1a1a1a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        /* Top bar */
        .viewer-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 44px;
            background: #111;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 12px;
            z-index: 10;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .viewer-back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.04em;
            transition: color 0.2s;
        }
        .viewer-back:hover { color: #fff; }

        .viewer-title {
            font-size: 12px;
            color: rgba(255,255,255,0.3);
            letter-spacing: 0.06em;
        }

        /* PDF iframe — fills remaining height below bar */
        .viewer-frame {
            position: fixed;
            top: 44px; left: 0; right: 0; bottom: 0;
            width: 100%;
            height: calc(100% - 44px);
            border: none;
        }
    </style>
</head>
<body oncontextmenu="return false">

<div class="viewer-bar">
    <a href="javascript:window.close()" class="viewer-back">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 5-7 7 7 7"/></svg>
        Close
    </a>
    <span class="viewer-title">Undergraduate &amp; Pre-MA Portfolio — Linyun Yu</span>
</div>

<iframe
    class="viewer-frame"
    src="assets/files/early-portfolio.pdf#toolbar=0&navpanes=0&scrollbar=1&view=FitH"
    title="Undergraduate & Pre-MA Portfolio">
</iframe>

<script>
    // Block Ctrl+S / Cmd+S (save/download shortcut)
    document.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && (e.key === 's' || e.key === 'S' || e.key === 'p' || e.key === 'P')) {
            e.preventDefault();
            return false;
        }
    });
</script>
</body>
</html>
